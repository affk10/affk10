<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中转站</title>
    <style>
        /* 1. 基础布局与背景 */
        body {
            background-image: url('img/wallpaper.jpg'); 
            background-size: cover;       
            background-position: center;  
            background-attachment: fixed; 
            color: #f0f0f0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 2. 核心标题和搜索框区域 */
        .header {
            margin-bottom: 40px;
            text-align: center;
        }
        h1 {
            color: #ffffff; /* 配合深色背景改为白色 */
            font-size: 2.5em;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .search-box {
            margin-top: 20px;
        }
        .search-box input {
            background-color: rgba(0, 0, 0, 0.4); 
            color: #ffffff;
            padding: 12px 25px;
            width: 450px;
            max-width: 85vw;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            font-size: 1em;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .search-box input:focus {
            border-color: #00bfff;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.5);
            background-color: rgba(0, 0, 0, 0.6);
        }
        .search-box input::placeholder {
            color: #cccccc;
        }
        
        /* 3. 链接图标网格布局 */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(4, 100px); 
            gap: 25px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 4. 单个图标样式 */
        .icon-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            transition: transform 0.2s;
        }

        /* 5. 图标的视觉样式 */
        .icon-box {
            width: 65px;
            height: 65px;
            border-radius: 16px;
            overflow: hidden; /* 确保图片不超出圆角 */
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .icon-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 自动裁剪填充 */
        }
        
        /* 6. 图标名称 */
        .icon-name {
            font-size: 0.85em;
            text-align: center;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }

        /* 手机端适配 */
        @media (max-width: 650px) {
            .icon-grid {
                grid-template-columns: repeat(3, 1fr); 
                gap: 20px;
                padding: 20px;
                width: 90%;
            }
            .icon-box {
                width: 60px;
                height: 60px; 
            }
            .header h1 {
                font-size: 1.8em;
            }
        }

        /* 电脑端悬停特效 */
        @media (min-width: 651px) {
            .icon-link:hover {
                transform: translateY(-8px) scale(1.05);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>中转站</h1>
        <form class="search-box" action="https://www.bing.com/search" method="get" target="_blank">
            <input type="text" name="q" placeholder="Bing 搜索..." required>
        </form>
    </div>

    <div class="icon-grid">
        <a href=":5160" class="icon-link dynamic-link" target="_blank">
            <div class="icon-box"><img src="img/bot控制台.png" alt="bot"></div>
            <span class="icon-name">bot控制台</span>
        </a>

        <a href=":7890" class="icon-link dynamic-link" target="_blank">
            <div class="icon-box"><img src="img/ab.png" alt="ab"></div>
            <span class="icon-name">ab</span>
        </a>

        <a href=":808" class="icon-link dynamic-link" target="_blank">
            <div class="icon-box"><img src="img/qbittorrent32.png" alt="qb"></div>
            <span class="icon-name">qb</span>
        </a>

        <a href=":9898" class="icon-link dynamic-link" target="_blank">
            <div class="icon-box"><img src="img/bt反吸血.png" alt="bt"></div>
            <span class="icon-name">bt反吸血</span>
        </a>

        <a href=":5212" class="icon-link dynamic-link" target="_blank">
            <div class="icon-box"><img src="img/网盘.png" alt="网盘"></div>
            <span class="icon-name">网盘</span>
        </a>

        <a href=":3002" class="icon-link dynamic-link" target="_blank">
            <div class="icon-box"><img src="img/测速.png" alt="测速"></div>
            <span class="icon-name">测速</span>
        </a>

        <a href=":8096" class="icon-link dynamic-link" target="_blank">
            <div class="icon-box"><img src="img/emby.png" alt="emby"></div>
            <span class="icon-name">emby</span>
        </a>
    </div>
    
    <script>
        const apiurl = "https://raspy-bread-ced5.zhaofujie0513.workers.dev";

        async function getLatestAddr() {
            try {
                const response = await fetch(apiurl + "?t=" + new Date().getTime());
                const data = await response.json();
                
                if (!data.addr || data.addr.includes("未更新")) {
                    console.log("Worker 尚未收到 Lucky 的地址更新");
                    return;
                }

                const host = "http://" + data.addr; 
                console.log("获取到最新地址:", host);

                document.querySelectorAll('.dynamic-link').forEach(link => {
                    const port = link.getAttribute('href'); 
                    if (!port.startsWith('http')) {
                        link.href = host + port;
                    }
                });
            } catch (err) {
                console.error("获取地址失败:", err);
            }
        }

        window.addEventListener('DOMContentLoaded', getLatestAddr);
    </script>
</body>
</html>
